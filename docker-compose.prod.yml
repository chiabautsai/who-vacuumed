version: '3.8'

services:
  app:
    environment:
      - NODE_ENV=production
    restart: always
    
  nginx:
    profiles: []  # Enable nginx by default in production
    environment:
      - NGINX_HOST=${DOMAIN:-localhost}
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ${SSL_CERT_PATH:-./ssl}:/etc/nginx/ssl:ro
    restart: always